# ─── Production profile: application-prod.properties ───────────────────────
# Activated by: SPRING_PROFILES_ACTIVE=prod
# All secrets come from environment variables — never commit real values here.

# PostgreSQL (use your Render/Railway connection string)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — don't validate/create tables in prod — manage via Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Redis (use your Upstash/Redis Cloud URL)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=60000ms

# Cache
spring.cache.type=redis

# App
server.port=${PORT:8080}
app.base-url=https://api.brevly.io

# CORS — allow the production frontend + root domain
# brevly.io       → landing page
# app.brevly.io   → React app (if served on a subdomain)
cors.allowed-origins=https://brevly.io,https://app.brevly.io,https://www.brevly.io

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry=${JWT_EXPIRY_MS:86400000}
