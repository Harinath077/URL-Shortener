# DATABASE
# On Render: uses DATABASE_URL. Locally: defaults to In-memory H2 database.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:url_shortener;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# REDIS
# On Render: uses REDIS_HOST. Locally: defaults to localhost.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}
spring.data.redis.timeout=60000ms

# Use Simple caching locally if Redis is not available
spring.cache.type=${CACHE_TYPE:simple}

# SERVER
server.port=8080
app.base-url=${APP_BASE_URL:http://localhost:8080}
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}