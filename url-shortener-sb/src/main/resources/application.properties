spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/url_shortener}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:AdminRoot}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=60000ms

spring.cache.type=${CACHE_TYPE:simple}
server.port=8080
app.base-url=${APP_BASE_URL:http://localhost:8080}
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

jwt.secret=${JWT_SECRET:dGVzdC1vbmx5LWtleS10aGF0LWlzLWF0LWxlYXN0LTMyLWJ5dGVzLWxvbmc=}
